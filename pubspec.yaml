name: focusguard_ai
description: "FocusGuard AI - Burnout Prediction & Intervention System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.9
  google_sign_in: ^6.2.2

  # AI (Groq via HTTP)
  http: ^1.2.2

  # State Management
  provider: ^6.1.5

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
